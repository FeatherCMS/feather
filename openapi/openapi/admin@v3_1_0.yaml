components:
  schemas:
    AuthResponseSchema:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserAccountDetailSchema'
        roles:
          type: array
          items:
            type: string
          minItems: 0
          uniqueItems: false
        permissions:
          type: array
          items:
            type: string
          minItems: 0
          uniqueItems: false
        token:
          $ref: '#/components/schemas/UserAuthTokenField'
      required:
      - user
      - roles
      - permissions
      - token
      minProperties: 4
    UserAccountDetailSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UserAccountIDField'
        email:
          $ref: '#/components/schemas/UserAccountEmailField'
        roleIds:
          $ref: '#/components/schemas/UserAccountRoleIDListSchema'
      required:
      - id
      - email
      minProperties: 2
    UserAccountIDField:
      type: string
      examples:
      - usr_a9x1f7Qk2m
    UserAccountEmailField:
      type: string
      examples:
      - admin@example.com
    UserAccountRoleIDListSchema:
      type: array
      items:
        type: string
      minItems: 0
      uniqueItems: false
    UserAuthTokenField:
      type: string
      examples:
      - eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    AuthLoginRequestSchema:
      type: object
      properties:
        email:
          $ref: '#/components/schemas/UserAccountEmailField'
        password:
          $ref: '#/components/schemas/UserAccountPasswordField'
        isPersistent:
          $ref: '#/components/schemas/UserAuthIsPersistentField'
      required:
      - email
      - password
      - isPersistent
      minProperties: 3
    UserAccountPasswordField:
      type: string
      examples:
      - root
    UserAuthIsPersistentField:
      type: boolean
      examples:
      - true
    AuthMagicLinkRequestSchema:
      type: object
      properties:
        email:
          type: string
          examples:
          - admin@example.com
        isPersistent:
          type: boolean
          examples:
          - true
      required:
      - email
      - isPersistent
      minProperties: 2
    AuthMagicLinkVerifyRequestSchema:
      type: object
      properties:
        token:
          type: string
          examples:
          - mgl_3XbY...
      required:
      - token
      minProperties: 1
    UserAccountCreateSchema:
      type: object
      properties:
        email:
          $ref: '#/components/schemas/UserAccountEmailField'
        password:
          $ref: '#/components/schemas/UserAccountPasswordField'
      required:
      - email
      - password
      minProperties: 2
    BulkDeleteRequestSchema:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
            examples:
            - id1
          minItems: 0
          uniqueItems: false
        summary:
          type: boolean
          examples:
          - true
      required:
      - ids
      - summary
      minProperties: 2
    BulkDeleteResponseSchema:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                examples:
                - id1
              status:
                type: string
                enum:
                - deleted
                - not_found
                - forbidden
                examples:
                - deleted
            required:
            - id
            - status
            minProperties: 2
          minItems: 0
          uniqueItems: false
        summary:
          type: object
          properties:
            requested:
              type: integer
              examples:
              - 1
            deleted:
              type: integer
              examples:
              - 1
            notFound:
              type: integer
              examples:
              - 1
            forbidden:
              type: integer
              examples:
              - 1
          required:
          - requested
          - deleted
          - notFound
          - forbidden
          minProperties: 4
      required:
      - results
      - summary
      minProperties: 2
    SearchFilterSchema:
      type: object
      properties:
        search:
          $ref: '#/components/schemas/SearchStringField'
      minProperties: 0
    SearchStringField:
      type: string
      examples:
      - foo
    UserAccountListItemSearchQuerySchema:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/SearchPageSchema'
        sort:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                enum:
                - id
                - email
                examples:
                - id
              direction:
                $ref: '#/components/schemas/SortDirection'
            required:
            - field
            - direction
            minProperties: 2
          minItems: 0
          uniqueItems: false
        filters:
          type: object
          properties:
            search:
              $ref: '#/components/schemas/SearchStringField'
          minProperties: 0
      required:
      - page
      - filters
      minProperties: 2
    SearchPageSchema:
      type: object
      properties:
        size:
          $ref: '#/components/schemas/SearchPageSizeField'
        number:
          $ref: '#/components/schemas/SearchPageNumberField'
      required:
      - size
      - number
      minProperties: 2
    SearchPageSizeField:
      type: integer
      examples:
      - 20
    SearchPageNumberField:
      type: integer
      examples:
      - 1
    SortDirection:
      type: string
      enum:
      - asc
      - desc
      examples:
      - asc
    UserAccountListItemSearchSchema:
      type: object
      properties:
        query:
          $ref: '#/components/schemas/UserAccountListItemSearchQuerySchema'
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserAccountListItemSchema'
              minItems: 0
              uniqueItems: false
            total:
              type: integer
              examples:
              - 123
          required:
          - items
          - total
          minProperties: 2
      required:
      - query
      - data
      minProperties: 2
    UserAccountListItemSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UserAccountIDField'
        email:
          $ref: '#/components/schemas/UserAccountEmailField'
      required:
      - id
      - email
      minProperties: 2
    UserAccountUpdateSchema:
      type: object
      properties:
        email:
